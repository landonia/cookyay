name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Changesets version PR or publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write # required for npm OIDC Trusted Publishing (no long-lived tokens)
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history required for Changesets to compute the changelog
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      # npm ≥ 11.5.1 is required for OIDC Trusted Publishing support.
      # Node 20 ships with npm 10.x, so we upgrade explicitly.
      - name: Upgrade npm to support OIDC Trusted Publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -r build

      - name: Create version PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          # When changesets exist: open/update a "Version Packages" PR.
          # When the PR is merged: publish to npm via OIDC Trusted Publishing.
          publish: pnpm release
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No NPM_TOKEN or NODE_AUTH_TOKEN — authentication is via OIDC Trusted
          # Publishing (npmjs.com package settings → Trusted Publisher → this
          # repo + release.yml). See architecture.md §7.
