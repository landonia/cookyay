##
## Cookyay curated service signature database
##
## Human-editable source for the curated service definitions.
## Compiled to src/db-curated.generated.ts by scripts/build-services-db.mjs.
## Also compiled to packages/cookyay/src/db-autoblock.generated.ts (client-safe
## slice: id/category/requestHosts/requestPaths/scriptUrlGlobs/iframeSrcGlobs/google
## only — cookies/localStorage/source stripped) by the same script.
##
## Schema: see schemaVersion below.
## License: Apache-2.0
##
## To add a service:
##   - Append an entry under `services:`
##   - id must be lowercase slug matching /^[a-z0-9-]+$/
##   - category must be one of: necessary | functional | analytics | marketing
##   - at least one of: cookies, localStorage, requestHosts must be non-empty
##   - Run `node scripts/build-services-db.mjs` to regenerate both generated files
##   - Commit the YAML and both generated TS files
##
## Fields:
##   id              (required) unique stable slug
##   name            (required) human-readable display name
##   category        (required) necessary | functional | analytics | marketing
##   cookies         (optional) array of {name, wildcard} cookie patterns
##   localStorage    (optional) array of {name, wildcard} localStorage key patterns
##   requestHosts    (optional) exact hostnames / parent domains (subdomain match)
##   requestPaths    (optional) Host-qualified path prefixes for path-level matching.
##                  Each entry is a "host/path" string (e.g. "facebook.com/tr").
##                  A request matches only when BOTH the host component equals (or
##                  is a subdomain of) the entry host AND the URL pathname starts
##                  with the entry path. Use this for services whose host is too
##                  broad to put in requestHosts (e.g. facebook.com, www.google.com).
##   scriptUrlGlobs  (optional) URL glob patterns for known script sources.
##                  Required when requestHosts contains a shared CDN host that also
##                  serves unrelated third-party scripts, to enable URL-level
##                  disambiguation in the client runtime matcher.
##   iframeSrcGlobs  (optional) URL glob patterns for known embed sources
##   google          (optional, boolean) true for Google-owned services.
##                  The runtime auto-block matcher skips Google-owned services and
##                  relies on Consent Mode v2 to degrade them instead (DOM-blocking
##                  GTM/GA4 would suppress all CM v2 update signals).
##

schemaVersion: 1

