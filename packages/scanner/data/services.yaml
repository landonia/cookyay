  - id: recaptcha
    name: Google reCAPTCHA
    category: functional
    ## google: true — Google-owned; Consent Mode v2 already handles Google service
    ## degradation. DOM-blocking www.google.com would also risk breaking other Google
    ## integrations on the same page.
    google: true
    cookies:
      - name: _GRECAPTCHA
        wildcard: false
    localStorage: []
    ## www.google.com is narrow enough (vs googleapis.com/gstatic.com) to not false-positive
    ## on Google Fonts/Maps. But we still need the path qualifier since www.google.com
    ## also serves search, so requestPaths anchors it to the reCAPTCHA path.
    requestHosts: []
    requestPaths:
      ## www.google.com is the reCAPTCHA script host; path anchors it to avoid false
      ## positives from www.google.com/maps, www.google.com/search, etc.
      - www.google.com/recaptcha/
    scriptUrlGlobs: []
    iframeSrcGlobs: []

